<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Translator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>YouTube Translator</h1>
        <label class="switch">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <label>
        目标语言
        <select id="targetLanguage">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </label>

      <label>
        源语言
        <select id="sourceLanguage">
          <option value="auto">自动识别</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </label>

      <label>
        字幕位置
        <select id="position">
          <option value="bottom">底部</option>
          <option value="top">顶部</option>
        </select>
      </label>

      <label>
        字号
        <input id="fontSize" type="range" min="14" max="32" step="1">
      </label>

      <label class="check">
        <input id="showOriginal" type="checkbox">
        显示原字幕
      </label>

      <button id="rescan" type="button">重新扫描当前视频</button>

      <p class="note">需要先打开 YouTube 自带字幕，插件会翻译当前显示的字幕文本。</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
